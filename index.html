<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <!-- Normalize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Font Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;500;700&display=swap" rel="stylesheet">

    <!-- Nosso CSS -->
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/pokedex.css">
    <link rel="stylesheet" href="/assets/css/moreinfo.css">
</head>

<body>
    <section class="content">
        <h1>Pokedex</h1>

        <ol id="pokemonList" class="pokemons">
            <!-- ..... Pokemons here ..... -->
        </ol>

        <div class="pagination">
            <button id="loadMoreButton" type="button">
                Load More
            </button>
        </div>
    </section>
    <div class="moreinfo">
        <div class="moreinfo__content">
            <button id="closeMoreInfo" type="button">X</button>
            <div class="pokemon-details" id="pokemonDetails">
                <header class="pokemon-details__header">
                    <div class="pokemon-details__title-group">
                        <div class="pokemon-details__title">
                            <h1>Bulbasaur</h1>
                            <ul class="pokemon-details__types">
                                <li class="pokemon-type pokemon-type--grass">Grass</li>
                                <li class="pokemon-type pokemon-type--poison">Poison</li>
                            </ul>
                        </div>
                        <div class="pokemon-details__number">
                            <h2>#001</h2>
                        </div>
                    </div>
                    <div class="pokemon-details__image-wrap">
                        <img class="pokemon-details__image"
                            src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/1.svg"
                            alt="Bulbasaur">
                    </div>
                </header>

                <section class="pokemon-details__panel">
                    <nav class="pokemon-details__tabs">
                        <ul class="pokemon-details__tabs-list">
                            <li class="pokemon-tab pokemon-tab--active">About</li>
                            <li class="pokemon-tab">Base Stats</li>
                            <li class="pokemon-tab">Evolution</li>
                            <li class="pokemon-tab">Moves</li>
                        </ul>
                    </nav>

                    <div class="pokemon-details__content">
                        <article class="pokemon-details__section">
                            <h2>About</h2>
                            <ul class="pokemon-details__list">
                                <li><span class="pokemon-details__label">Species:</span> Seed Pokémon</li>
                                <li><span class="pokemon-details__label">Height:</span> 0.7 m</li>
                                <li><span class="pokemon-details__label">Weight:</span> 6.9 kg</li>
                                <li><span class="pokemon-details__label">Abilities:</span> Overgrow, Chlorophyll</li>
                            </ul>
                        </article>

                        <article class="pokemon-details__section">
                            <h2>Breeding</h2>
                            <ul class="pokemon-details__list">
                                <li><span class="pokemon-details__label">Gender:</span> 87.5% / 12.5%</li>
                                <li><span class="pokemon-details__label">Egg Groups:</span> Grass</li>
                                <li><span class="pokemon-details__label">Egg Cycles:</span> 20</li>
                            </ul>
                        </article>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <!-- Nosso JS -->
    <script src="/assets/js/pokemon-model.js"></script>
    <script src="/assets/js/poke-api.js"></script>
    <script src="/assets/js/main.js"></script>
</body>

</html>
